<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Edit Track</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item>
      <ion-label position="floating">Name</ion-label>
      <ion-input type="text" [(ngModel)]="name"></ion-input>
    </ion-item>
  </ion-list>
  
  <ion-button color="dark" (click)="closeModal()">Cancel</ion-button>
  <ion-button color="primary" (click)="saveHandler()">Save</ion-button>

</ion-content>
