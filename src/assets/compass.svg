    <path d="M 170 430 A 330 330, 0, 0 1, 430 170" stroke="#222222" stroke-width="5" />
    <path d="M 190 430 A 310 310, 0, 0 1, 430 190" stroke="#222222" stroke-width="5" />


    <!-- Outer Circle -->

    <text
