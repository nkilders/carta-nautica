    </text>
    
    <path d="M 830 570 A 330 330, 0, 0 1, 570 830" stroke="#222222" stroke-width="5" />
    <path d="M 810 570 A 310 310, 0, 0 1, 570 810" stroke="#222222" stroke-width="5" />

    <text
