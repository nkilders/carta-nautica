        N
    </text>

    <path d="M 570 170 A 330 330, 0, 0 1, 830 430" stroke="#222222" stroke-width="5" />
    <path d="M 570 190 A 310 310, 0, 0 1, 810 430" stroke="#222222" stroke-width="5" />

    <text
